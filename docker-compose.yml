version: "3.8"

services:
  resume-optimizer:
    build: .
    ports:
      - "8000:8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
    volumes:
      - resume-data:/app/data
    restart: unless-stopped

volumes:
  resume-data:
